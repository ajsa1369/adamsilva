<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bg)" />
  <rect x="1" y="1" width="798" height="498" rx="16" fill="none" stroke="#ec4899" stroke-opacity="0.15" />

  <!-- Title -->
  <text x="40" y="45" fill="#f8fafc" font-size="22" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Press Distribution Network</text>
  <text x="40" y="70" fill="#94a3b8" font-size="13" font-family="system-ui, -apple-system, sans-serif">Multi-Channel Syndication Hub</text>

  <!-- Central Hub -->
  <circle cx="300" cy="250" r="55" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-opacity="0.6" stroke-width="2" />
  <text x="300" y="243" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Press</text>
  <text x="300" y="260" text-anchor="middle" fill="#ec4899" font-size="12" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Syndication</text>
  <text x="300" y="275" text-anchor="middle" fill="#ec4899" font-size="11" font-family="system-ui, -apple-system, sans-serif">Hub</text>

  <!-- Spoke 1: News Wires (top-right) -->
  <line x1="345" y1="210" x2="430" y2="130" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.4" />
  <rect x="420" y="100" width="140" height="55" rx="8" fill="#1e293b" stroke="#ec4899" stroke-opacity="0.3" />
  <text x="490" y="122" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600" font-family="system-ui, -apple-system, sans-serif">News Wires</text>
  <text x="490" y="140" text-anchor="middle" fill="#ec4899" font-size="10" font-family="system-ui, -apple-system, sans-serif">AP, Reuters, UPI</text>

  <!-- Spoke 2: Industry Pubs (right) -->
  <line x1="355" y1="250" x2="430" y2="250" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.4" />
  <rect x="420" y="225" width="140" height="55" rx="8" fill="#1e293b" stroke="#ec4899" stroke-opacity="0.3" />
  <text x="490" y="247" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Industry Pubs</text>
  <text x="490" y="265" text-anchor="middle" fill="#ec4899" font-size="10" font-family="system-ui, -apple-system, sans-serif">TechCrunch, Wired</text>

  <!-- Spoke 3: Blogs (bottom-right) -->
  <line x1="345" y1="290" x2="430" y2="360" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.4" />
  <rect x="420" y="340" width="140" height="55" rx="8" fill="#1e293b" stroke="#ec4899" stroke-opacity="0.3" />
  <text x="490" y="362" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Blog Networks</text>
  <text x="490" y="380" text-anchor="middle" fill="#ec4899" font-size="10" font-family="system-ui, -apple-system, sans-serif">Medium, Substack</text>

  <!-- Spoke 4: Social (top-left) -->
  <line x1="255" y1="210" x2="170" y2="140" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.4" />
  <rect x="40" y="110" width="140" height="55" rx="8" fill="#1e293b" stroke="#ec4899" stroke-opacity="0.3" />
  <text x="110" y="132" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Social Media</text>
  <text x="110" y="150" text-anchor="middle" fill="#ec4899" font-size="10" font-family="system-ui, -apple-system, sans-serif">LinkedIn, X, FB</text>

  <!-- Spoke 5: Podcasts (bottom-left) -->
  <line x1="255" y1="290" x2="170" y2="365" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.4" />
  <rect x="40" y="340" width="140" height="55" rx="8" fill="#1e293b" stroke="#ec4899" stroke-opacity="0.3" />
  <text x="110" y="362" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Podcasts</text>
  <text x="110" y="380" text-anchor="middle" fill="#ec4899" font-size="10" font-family="system-ui, -apple-system, sans-serif">Spotify, Apple</text>

  <!-- Right side: Reach Metrics -->
  <rect x="590" y="95" width="175" height="310" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="677" y="125" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Reach Metrics</text>

  <text x="610" y="160" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Impressions</text>
  <text x="745" y="160" text-anchor="end" fill="#ec4899" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">2.4M</text>

  <line x1="610" y1="172" x2="745" y2="172" stroke="#334155" stroke-width="0.5" />

  <text x="610" y="195" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Outlets Reached</text>
  <text x="745" y="195" text-anchor="end" fill="#ec4899" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">450+</text>

  <line x1="610" y1="207" x2="745" y2="207" stroke="#334155" stroke-width="0.5" />

  <text x="610" y="230" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Backlinks</text>
  <text x="745" y="230" text-anchor="end" fill="#ec4899" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">85</text>

  <line x1="610" y1="242" x2="745" y2="242" stroke="#334155" stroke-width="0.5" />

  <text x="610" y="265" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Domain Authority</text>
  <text x="745" y="265" text-anchor="end" fill="#ec4899" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">+12</text>

  <line x1="610" y1="277" x2="745" y2="277" stroke="#334155" stroke-width="0.5" />

  <text x="610" y="300" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">AI Citation Rate</text>
  <text x="745" y="300" text-anchor="end" fill="#ec4899" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">34%</text>

  <line x1="610" y1="312" x2="745" y2="312" stroke="#334155" stroke-width="0.5" />

  <text x="610" y="335" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Cost per Mention</text>
  <text x="745" y="335" text-anchor="end" fill="#ec4899" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">$0.42</text>

  <!-- Pulse rings -->
  <circle cx="300" cy="250" r="70" fill="none" stroke="#ec4899" stroke-opacity="0.1" stroke-width="1" />
  <circle cx="300" cy="250" r="90" fill="none" stroke="#ec4899" stroke-opacity="0.06" stroke-width="1" />

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" rx="0" fill="#ec4899" opacity="0.08" />
  <text x="400" y="484" text-anchor="middle" fill="#ec4899" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Adam Silva Consulting — adamsilvaconsulting.com</text>
</svg>