<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bg)" />
  <rect x="1" y="1" width="798" height="498" rx="16" fill="none" stroke="#8b5cf6" stroke-opacity="0.15" />

  <!-- Title -->
  <text x="40" y="45" fill="#f8fafc" font-size="22" font-weight="700" font-family="system-ui, -apple-system, sans-serif">ACP Transaction Flow</text>
  <text x="40" y="70" fill="#94a3b8" font-size="13" font-family="system-ui, -apple-system, sans-serif">Agentic Commerce Protocol — End-to-End Checkout</text>

  <!-- Flow: 4 main stages connected horizontally -->
  <!-- Stage 1: Agent Request -->
  <rect x="30" y="110" width="160" height="140" rx="12" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.4" />
  <text x="110" y="138" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">AI Agent</text>
  <line x1="50" y1="148" x2="170" y2="148" stroke="#334155" stroke-width="0.5" />
  <text x="110" y="170" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">User Intent</text>
  <text x="110" y="188" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Product Discovery</text>
  <text x="110" y="206" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Price Negotiation</text>
  <text x="110" y="224" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Cart Assembly</text>
  <text x="110" y="242" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">POST /api/acp/negotiate</text>

  <!-- Arrow 1 -->
  <line x1="195" y1="180" x2="225" y2="180" stroke="#8b5cf6" stroke-width="2" />
  <polygon points="225,175 235,180 225,185" fill="#8b5cf6" />

  <!-- Stage 2: ACP API -->
  <rect x="240" y="110" width="160" height="140" rx="12" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.5" />
  <text x="320" y="138" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">ACP API Layer</text>
  <line x1="260" y1="148" x2="380" y2="148" stroke="#334155" stroke-width="0.5" />
  <text x="320" y="170" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Validate Request</text>
  <text x="320" y="188" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Apply Pricing Rules</text>
  <text x="320" y="206" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Generate Session</text>
  <text x="320" y="224" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Create Payment Intent</text>
  <text x="320" y="242" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">POST /api/acp/checkout</text>

  <!-- Arrow 2 -->
  <line x1="405" y1="180" x2="435" y2="180" stroke="#8b5cf6" stroke-width="2" />
  <polygon points="435,175 445,180 435,185" fill="#8b5cf6" />

  <!-- Stage 3: Stripe SPT -->
  <rect x="450" y="110" width="160" height="140" rx="12" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.4" />
  <text x="530" y="138" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Stripe SPT</text>
  <line x1="470" y1="148" x2="590" y2="148" stroke="#334155" stroke-width="0.5" />
  <text x="530" y="170" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Session Payment</text>
  <text x="530" y="188" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Token Verification</text>
  <text x="530" y="206" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">PCI Compliance</text>
  <text x="530" y="224" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Charge + Receipt</text>
  <text x="530" y="242" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Webhook Event</text>

  <!-- Arrow 3 -->
  <line x1="615" y1="180" x2="645" y2="180" stroke="#8b5cf6" stroke-width="2" />
  <polygon points="645,175 655,180 645,185" fill="#8b5cf6" />

  <!-- Stage 4: Confirmation -->
  <rect x="660" y="110" width="110" height="140" rx="12" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-opacity="0.6" stroke-width="2" />
  <text x="715" y="138" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Confirmed</text>
  <line x1="675" y1="148" x2="755" y2="148" stroke="#334155" stroke-width="0.5" />
  <text x="715" y="170" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Order Created</text>
  <text x="715" y="188" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Receipt Sent</text>
  <text x="715" y="206" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Agent Notified</text>
  <text x="715" y="224" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Audit Logged</text>
  <text x="715" y="242" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">status: complete</text>

  <!-- Transaction Details Panel -->
  <rect x="30" y="280" width="740" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="400" y="310" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Transaction Specifications</text>

  <!-- Spec grid -->
  <rect x="50" y="325" width="160" height="75" rx="8" fill="#0f172a" stroke="#334155" />
  <text x="130" y="348" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Latency</text>
  <text x="130" y="372" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700" font-family="system-ui, -apple-system, sans-serif">&lt; 800ms</text>
  <text x="130" y="390" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, -apple-system, sans-serif">End-to-end</text>

  <rect x="230" y="325" width="160" height="75" rx="8" fill="#0f172a" stroke="#334155" />
  <text x="310" y="348" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Success Rate</text>
  <text x="310" y="372" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700" font-family="system-ui, -apple-system, sans-serif">99.7%</text>
  <text x="310" y="390" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, -apple-system, sans-serif">Last 30 days</text>

  <rect x="410" y="325" width="160" height="75" rx="8" fill="#0f172a" stroke="#334155" />
  <text x="490" y="348" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Currencies</text>
  <text x="490" y="372" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700" font-family="system-ui, -apple-system, sans-serif">135+</text>
  <text x="490" y="390" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, -apple-system, sans-serif">Via Stripe</text>

  <rect x="590" y="325" width="160" height="75" rx="8" fill="#0f172a" stroke="#334155" />
  <text x="670" y="348" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Methods</text>
  <text x="670" y="372" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Card+ACH</text>
  <text x="670" y="390" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, -apple-system, sans-serif">Apple Pay, Google Pay</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" rx="0" fill="#8b5cf6" opacity="0.08" />
  <text x="400" y="484" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Adam Silva Consulting — adamsilvaconsulting.com</text>
</svg>