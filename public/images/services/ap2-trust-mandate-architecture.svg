<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bg)" />
  <rect x="1" y="1" width="798" height="498" rx="16" fill="none" stroke="#10b981" stroke-opacity="0.15" />

  <!-- Title -->
  <text x="40" y="45" fill="#f8fafc" font-size="22" font-weight="700" font-family="system-ui, -apple-system, sans-serif">AP2 Trust Architecture</text>
  <text x="40" y="70" fill="#94a3b8" font-size="13" font-family="system-ui, -apple-system, sans-serif">Agent Payment Protocol v2 — Mandate and Verification Flow</text>

  <!-- Three-layer flow: Mandate Signing → Verification → Audit Trail -->

  <!-- Layer 1: Mandate Signing -->
  <rect x="30" y="100" width="230" height="200" rx="12" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-opacity="0.3" />
  <text x="145" y="128" text-anchor="middle" fill="#10b981" font-size="15" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Mandate Signing</text>
  <line x1="50" y1="138" x2="240" y2="138" stroke="#334155" stroke-width="0.5" />

  <!-- Mandate items -->
  <rect x="50" y="150" width="190" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <circle cx="70" cy="165" r="6" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-opacity="0.6" />
  <text x="85" y="169" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Spending Limits Defined</text>

  <rect x="50" y="188" width="190" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <circle cx="70" cy="203" r="6" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-opacity="0.6" />
  <text x="85" y="207" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Vendor Whitelist Set</text>

  <rect x="50" y="226" width="190" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <circle cx="70" cy="241" r="6" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-opacity="0.6" />
  <text x="85" y="245" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Time Boundaries Locked</text>

  <rect x="50" y="264" width="190" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <circle cx="70" cy="279" r="6" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-opacity="0.6" />
  <text x="85" y="283" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Cryptographic Signature</text>

  <!-- Arrow 1 -->
  <line x1="265" y1="200" x2="290" y2="200" stroke="#10b981" stroke-width="2" />
  <polygon points="290,195 300,200 290,205" fill="#10b981" />

  <!-- Layer 2: Verification -->
  <rect x="305" y="100" width="210" height="200" rx="12" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.4" />
  <text x="410" y="128" text-anchor="middle" fill="#10b981" font-size="15" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Verification Engine</text>
  <line x1="325" y1="138" x2="495" y2="138" stroke="#334155" stroke-width="0.5" />

  <!-- Verification checks -->
  <rect x="325" y="150" width="170" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <text x="410" y="169" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Mandate Bounds Check</text>

  <rect x="325" y="188" width="170" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <text x="410" y="207" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Identity Verification</text>

  <rect x="325" y="226" width="170" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <text x="410" y="245" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Fraud Detection</text>

  <rect x="325" y="264" width="170" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <text x="410" y="283" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Compliance Screening</text>

  <!-- Arrow 2 -->
  <line x1="520" y1="200" x2="545" y2="200" stroke="#10b981" stroke-width="2" />
  <polygon points="545,195 555,200 545,205" fill="#10b981" />

  <!-- Layer 3: Audit Trail -->
  <rect x="560" y="100" width="210" height="200" rx="12" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-opacity="0.3" />
  <text x="665" y="128" text-anchor="middle" fill="#10b981" font-size="15" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Audit Trail</text>
  <line x1="580" y1="138" x2="750" y2="138" stroke="#334155" stroke-width="0.5" />

  <!-- Audit entries -->
  <rect x="580" y="150" width="170" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <text x="665" y="169" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Immutable Event Log</text>

  <rect x="580" y="188" width="170" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <text x="665" y="207" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Hash Chain Integrity</text>

  <rect x="580" y="226" width="170" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <text x="665" y="245" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Real-Time Alerts</text>

  <rect x="580" y="264" width="170" height="30" rx="6" fill="#0f172a" stroke="#334155" />
  <text x="665" y="283" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Compliance Reports</text>

  <!-- Trust Score Panel -->
  <rect x="30" y="325" width="740" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="400" y="352" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Trust &amp; Security Metrics</text>

  <!-- Metric cards -->
  <rect x="50" y="365" width="130" height="45" rx="6" fill="#0f172a" stroke="#10b981" stroke-opacity="0.2" />
  <text x="115" y="384" text-anchor="middle" fill="#10b981" font-size="16" font-weight="700" font-family="system-ui, -apple-system, sans-serif">256-bit</text>
  <text x="115" y="400" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, -apple-system, sans-serif">Encryption</text>

  <rect x="200" y="365" width="130" height="45" rx="6" fill="#0f172a" stroke="#10b981" stroke-opacity="0.2" />
  <text x="265" y="384" text-anchor="middle" fill="#10b981" font-size="16" font-weight="700" font-family="system-ui, -apple-system, sans-serif">100%</text>
  <text x="265" y="400" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, -apple-system, sans-serif">Audit Coverage</text>

  <rect x="350" y="365" width="130" height="45" rx="6" fill="#0f172a" stroke="#10b981" stroke-opacity="0.2" />
  <text x="415" y="384" text-anchor="middle" fill="#10b981" font-size="16" font-weight="700" font-family="system-ui, -apple-system, sans-serif">0</text>
  <text x="415" y="400" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, -apple-system, sans-serif">Unauthorized Txns</text>

  <rect x="500" y="365" width="130" height="45" rx="6" fill="#0f172a" stroke="#10b981" stroke-opacity="0.2" />
  <text x="565" y="384" text-anchor="middle" fill="#10b981" font-size="16" font-weight="700" font-family="system-ui, -apple-system, sans-serif">&lt;50ms</text>
  <text x="565" y="400" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, -apple-system, sans-serif">Verify Latency</text>

  <rect x="650" y="365" width="100" height="45" rx="6" fill="#0f172a" stroke="#10b981" stroke-opacity="0.2" />
  <text x="700" y="384" text-anchor="middle" fill="#10b981" font-size="16" font-weight="700" font-family="system-ui, -apple-system, sans-serif">SOC2</text>
  <text x="700" y="400" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, -apple-system, sans-serif">Compliant</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" rx="0" fill="#10b981" opacity="0.08" />
  <text x="400" y="484" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Adam Silva Consulting — adamsilvaconsulting.com</text>
</svg>