<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bg)" />
  <rect x="1" y="1" width="798" height="498" rx="16" fill="none" stroke="#f59e0b" stroke-opacity="0.15" />

  <!-- Title -->
  <text x="40" y="45" fill="#f8fafc" font-size="22" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Content Engine Pipeline</text>
  <text x="40" y="70" fill="#94a3b8" font-size="13" font-family="system-ui, -apple-system, sans-serif">Automated Blog Production at Scale</text>

  <!-- Pipeline stages -->
  <!-- Stage 1: Research -->
  <rect x="40" y="100" width="130" height="110" rx="10" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.3" />
  <text x="105" y="125" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">1. Research</text>
  <line x1="60" y1="135" x2="150" y2="135" stroke="#334155" stroke-width="0.5" />
  <text x="105" y="155" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Keyword Analysis</text>
  <text x="105" y="170" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Topic Clusters</text>
  <text x="105" y="185" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Competitor Gaps</text>
  <text x="105" y="200" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">50+ topics/mo</text>

  <!-- Arrow -->
  <line x1="175" y1="155" x2="205" y2="155" stroke="#f59e0b" stroke-width="2" />
  <polygon points="205,150 215,155 205,160" fill="#f59e0b" />

  <!-- Stage 2: Draft -->
  <rect x="220" y="100" width="130" height="110" rx="10" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.3" />
  <text x="285" y="125" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">2. Draft</text>
  <line x1="240" y1="135" x2="330" y2="135" stroke="#334155" stroke-width="0.5" />
  <text x="285" y="155" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">AI-Assisted</text>
  <text x="285" y="170" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">2,000+ words</text>
  <text x="285" y="185" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Schema-Ready</text>
  <text x="285" y="200" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">30 drafts/mo</text>

  <!-- Arrow -->
  <line x1="355" y1="155" x2="385" y2="155" stroke="#f59e0b" stroke-width="2" />
  <polygon points="385,150 395,155 385,160" fill="#f59e0b" />

  <!-- Stage 3: Edit -->
  <rect x="400" y="100" width="130" height="110" rx="10" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.3" />
  <text x="465" y="125" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">3. Edit + QA</text>
  <line x1="420" y1="135" x2="510" y2="135" stroke="#334155" stroke-width="0.5" />
  <text x="465" y="155" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Human Review</text>
  <text x="465" y="170" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Fact Check</text>
  <text x="465" y="185" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">SEO Optimize</text>
  <text x="465" y="200" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">20 approved/mo</text>

  <!-- Arrow -->
  <line x1="535" y1="155" x2="565" y2="155" stroke="#f59e0b" stroke-width="2" />
  <polygon points="565,150 575,155 565,160" fill="#f59e0b" />

  <!-- Stage 4: Publish -->
  <rect x="580" y="100" width="180" height="110" rx="10" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-opacity="0.5" />
  <text x="670" y="125" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">4. Publish</text>
  <line x1="600" y1="135" x2="740" y2="135" stroke="#334155" stroke-width="0.5" />
  <text x="670" y="155" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Strapi CMS Deploy</text>
  <text x="670" y="170" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">JSON-LD Injected</text>
  <text x="670" y="185" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, -apple-system, sans-serif">RSS + Sitemap</text>
  <text x="670" y="200" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">10 published/mo</text>

  <!-- Monthly Output Dashboard -->
  <rect x="40" y="240" width="720" height="180" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="400" y="270" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Monthly Content Output</text>

  <!-- Bar chart -->
  <text x="100" y="310" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">Jan</text>
  <rect x="80" y="318" width="40" height="30" rx="3" fill="#f59e0b" opacity="0.5" />
  <text x="100" y="340" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">4</text>

  <text x="180" y="310" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">Feb</text>
  <rect x="160" y="308" width="40" height="40" rx="3" fill="#f59e0b" opacity="0.55" />
  <text x="180" y="335" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">6</text>

  <text x="260" y="310" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">Mar</text>
  <rect x="240" y="298" width="40" height="50" rx="3" fill="#f59e0b" opacity="0.6" />
  <text x="260" y="330" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">8</text>

  <text x="340" y="310" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">Apr</text>
  <rect x="320" y="288" width="40" height="60" rx="3" fill="#f59e0b" opacity="0.7" />
  <text x="340" y="325" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">10</text>

  <text x="420" y="310" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">May</text>
  <rect x="400" y="278" width="40" height="70" rx="3" fill="#f59e0b" opacity="0.75" />
  <text x="420" y="320" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">12</text>

  <text x="500" y="310" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">Jun</text>
  <rect x="480" y="268" width="40" height="80" rx="3" fill="#f59e0b" opacity="0.8" />
  <text x="500" y="315" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">15</text>

  <text x="580" y="310" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">Jul</text>
  <rect x="560" y="258" width="40" height="90" rx="3" fill="#f59e0b" opacity="0.85" />
  <text x="580" y="310" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">18</text>

  <text x="660" y="310" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">Aug</text>
  <rect x="640" y="248" width="40" height="100" rx="3" fill="#f59e0b" opacity="0.9" />
  <text x="660" y="305" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600" font-family="system-ui, -apple-system, sans-serif">20</text>

  <!-- Baseline -->
  <line x1="60" y1="348" x2="720" y2="348" stroke="#334155" stroke-width="1" />

  <!-- Total -->
  <text x="400" y="400" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="700" font-family="system-ui, -apple-system, sans-serif">93 Articles in 8 Months</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" rx="0" fill="#f59e0b" opacity="0.08" />
  <text x="400" y="484" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Adam Silva Consulting — adamsilvaconsulting.com</text>
</svg>