  <circle cx="500" cy="350" r="3" fill="#3b82f6" />
  <circle cx="540" cy="340" r="3" fill="#3b82f6" />
  <circle cx="580" cy="325" r="3" fill="#3b82f6" />
  <circle cx="620" cy="310" r="3" fill="#3b82f6" />
