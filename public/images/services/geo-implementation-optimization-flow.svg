<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bg)" />
  <rect x="1" y="1" width="798" height="498" rx="16" fill="none" stroke="#10b981" stroke-opacity="0.15" />

  <!-- Title -->
  <text x="40" y="45" fill="#f8fafc" font-size="22" font-weight="700" font-family="system-ui, -apple-system, sans-serif">GEO Optimization Flow</text>
  <text x="40" y="70" fill="#94a3b8" font-size="13" font-family="system-ui, -apple-system, sans-serif">Content to AI Citation Pipeline</text>

  <!-- Pipeline Steps -->
  <!-- Step 1: Content -->
  <rect x="40" y="110" width="150" height="80" rx="10" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.4" />
  <text x="115" y="142" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Content</text>
  <text x="115" y="162" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">Articles, Pages</text>
  <text x="115" y="178" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">FAQ Blocks</text>

  <!-- Arrow 1 -->
  <line x1="195" y1="150" x2="235" y2="150" stroke="#10b981" stroke-width="2" />
  <polygon points="235,145 245,150 235,155" fill="#10b981" />

  <!-- Step 2: Schema -->
  <rect x="250" y="110" width="150" height="80" rx="10" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.4" />
  <text x="325" y="142" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Schema Markup</text>
  <text x="325" y="162" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">JSON-LD, FAQPage</text>
  <text x="325" y="178" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">Speakable, HowTo</text>

  <!-- Arrow 2 -->
  <line x1="405" y1="150" x2="445" y2="150" stroke="#10b981" stroke-width="2" />
  <polygon points="445,145 455,150 445,155" fill="#10b981" />

  <!-- Step 3: AI Engine -->
  <rect x="460" y="110" width="150" height="80" rx="10" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.4" />
  <text x="535" y="142" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">AI Engines</text>
  <text x="535" y="162" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">ChatGPT, Gemini</text>
  <text x="535" y="178" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">Perplexity, Claude</text>

  <!-- Arrow 3 -->
  <line x1="615" y1="150" x2="655" y2="150" stroke="#10b981" stroke-width="2" />
  <polygon points="655,145 665,150 655,155" fill="#10b981" />

  <!-- Step 4: Citation -->
  <rect x="670" y="110" width="100" height="80" rx="10" fill="#10b981" fill-opacity="0.25" stroke="#10b981" stroke-opacity="0.6" />
  <text x="720" y="145" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Citation</text>
  <text x="720" y="165" text-anchor="middle" fill="#f8fafc" font-size="11" font-family="system-ui, -apple-system, sans-serif">Your Brand</text>

  <!-- Before / After Comparison -->
  <text x="40" y="240" fill="#64748b" font-size="12" font-weight="600" font-family="system-ui, -apple-system, sans-serif">BEFORE GEO</text>
  <text x="420" y="240" fill="#10b981" font-size="12" font-weight="600" font-family="system-ui, -apple-system, sans-serif">AFTER GEO</text>

  <!-- Before metrics panel -->
  <rect x="40" y="255" width="340" height="160" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" />

  <!-- Before bars -->
  <text x="60" y="285" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">AI Citations</text>
  <rect x="175" y="273" width="40" height="14" rx="3" fill="#ef4444" opacity="0.6" />
  <text x="225" y="285" fill="#ef4444" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">2%</text>

  <text x="60" y="315" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">Schema Coverage</text>
  <rect x="175" y="303" width="30" height="14" rx="3" fill="#ef4444" opacity="0.6" />
  <text x="215" y="315" fill="#ef4444" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">12%</text>

  <text x="60" y="345" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">Speakable Tags</text>
  <rect x="175" y="333" width="10" height="14" rx="3" fill="#ef4444" opacity="0.6" />
  <text x="195" y="345" fill="#ef4444" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">0</text>

  <text x="60" y="375" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">AI Visibility Score</text>
  <rect x="175" y="363" width="20" height="14" rx="3" fill="#ef4444" opacity="0.6" />
  <text x="205" y="375" fill="#ef4444" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">8/100</text>

  <!-- After metrics panel -->
  <rect x="420" y="255" width="340" height="160" rx="10" fill="#1e293b" stroke="#10b981" stroke-opacity="0.3" stroke-width="1" />

  <!-- After bars -->
  <text x="440" y="285" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">AI Citations</text>
  <rect x="555" y="273" width="140" height="14" rx="3" fill="#10b981" opacity="0.8" />
  <text x="705" y="285" fill="#10b981" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">47%</text>

  <text x="440" y="315" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">Schema Coverage</text>
  <rect x="555" y="303" width="155" height="14" rx="3" fill="#10b981" opacity="0.8" />
  <text x="720" y="315" fill="#10b981" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">98%</text>

  <text x="440" y="345" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">Speakable Tags</text>
  <rect x="555" y="333" width="80" height="14" rx="3" fill="#10b981" opacity="0.8" />
  <text x="645" y="345" fill="#10b981" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">24</text>

  <text x="440" y="375" fill="#94a3b8" font-size="11" font-family="system-ui, -apple-system, sans-serif">AI Visibility Score</text>
  <rect x="555" y="363" width="145" height="14" rx="3" fill="#10b981" opacity="0.8" />
  <text x="710" y="375" fill="#10b981" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">92/100</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" rx="0" fill="#10b981" opacity="0.08" />
  <text x="400" y="484" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Adam Silva Consulting — adamsilvaconsulting.com</text>
</svg>