<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 240" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800&amp;display=swap');

      .text-title { font-family: 'Montserrat', sans-serif; font-weight: 800; }
      .text-sub { font-family: 'Montserrat', sans-serif; font-weight: 500; }

      .bg-quad {
        animation: scaleIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      }
      .q1 { transform-origin: 68px 68px; animation-delay: 0.1s; }
      .q2 { transform-origin: 172px 68px; animation-delay: 0.2s; }
      .q3 { transform-origin: 68px 172px; animation-delay: 0.3s; }
      .q4 { transform-origin: 172px 172px; animation-delay: 0.4s; }

      .white-center {
        transform-origin: 120px 120px;
        animation: scaleInFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s both;
      }

      .trace {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: drawLine 1.5s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
      .trace-circle {
        opacity: 0;
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      }
      .t1 { animation-delay: 0.8s; }
      .t2 { animation-delay: 1.0s; }
      .t3 { animation-delay: 1.2s; }

      .arrow {
        opacity: 0;
        transform: translateY(25px);
        animation: slideUpFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }
      .a1 { animation-delay: 1.5s; }
      .a2 { animation-delay: 1.7s; }

      .text-reveal {
        opacity: 0;
        transform: translateX(30px);
        animation: slideLeftFade 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }
      .txt1 { animation-delay: 0.7s; }
      .txt2 { animation-delay: 0.9s; }
      .txt3 { animation-delay: 1.1s; }

      @keyframes scaleIn {
        0% { transform: scale(0); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes scaleInFade {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes drawLine {
        100% { stroke-dashoffset: 0; }
      }
      @keyframes popIn {
        0% { transform: scale(0); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(25px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideLeftFade {
        0% { opacity: 0; transform: translateX(30px); }
        100% { opacity: 1; transform: translateX(0); }
      }
    </style>

    <clipPath id="logo-clip">
      <rect x="20" y="20" width="200" height="200" rx="45" />
    </clipPath>
  </defs>

  <g clip-path="url(#logo-clip)">
    <rect x="20" y="20" width="200" height="200" fill="#ffffff" />

    <rect class="bg-quad q1" x="20" y="20" width="96" height="96" fill="#0d243f" />
    <rect class="bg-quad q2" x="124" y="20" width="96" height="96" fill="#5c95bd" />
    <rect class="bg-quad q3" x="20" y="124" width="96" height="96" fill="#81b6d7" />
    <rect class="bg-quad q4" x="124" y="124" width="96" height="96" fill="#a5d2eb" />

    <circle class="white-center" cx="120" cy="120" r="42" fill="#ffffff" />

    <g fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
      <path class="trace t1" d="M 64 60 L 85 60 L 105 80 L 116 80" />
      <circle class="trace-circle t1" cx="60" cy="60" r="5" transform-origin="60px 60px" />

      <path class="trace t2" d="M 55 80 L 55 105" />
      <path class="trace t2" d="M 70 90 L 70 100" />

      <path class="trace t2" d="M 85 100 L 95 100 L 105 110 L 116 110" />

      <path class="trace t1" d="M 64 176 L 90 150" />
      <circle class="trace-circle t1" cx="60" cy="180" r="5" transform-origin="60px 180px" />

      <path class="trace t3" d="M 85 180 L 105 180" />
      <path class="trace t3" d="M 85 195 L 105 195" />

      <path class="trace t3" d="M 116 145 L 105 145 L 105 165 L 116 165" />

      <path class="trace t2" d="M 124 140 L 140 140 L 160 160 L 170 160" />
      <circle class="trace-circle t2" cx="175" cy="160" r="5" transform-origin="175px 160px" />

      <path class="trace t3" d="M 124 165 L 130 165 L 145 180 L 155 180" />
      <circle class="trace-circle t3" cx="160" cy="180" r="5" transform-origin="160px 180px" />
    </g>

    <g transform="rotate(45 120 120)">
      <g class="arrow a1">
        <line x1="120" y1="162" x2="120" y2="120" stroke="#0d243f" stroke-width="11" stroke-linecap="round" />
        <polygon points="120,90 102,125 138,125" fill="#0d243f" />
      </g>
      <g class="arrow a2">
        <polygon points="120,20 82,75 158,75" fill="#81b6d7" />
      </g>
    </g>
  </g>

  <g class="text-title">
    <text x="250" y="95" font-size="78" fill="#0d243f" letter-spacing="-0.5" class="text-reveal txt1">ADAM SILVA</text>
    <text x="250" y="172" font-size="78" fill="#5c95bd" letter-spacing="0" class="text-reveal txt2">CONSULTING</text>
  </g>
  <g class="text-sub">
    <text x="250" y="218" font-size="24" fill="#0d243f" letter-spacing="0.2" class="text-reveal txt3">Global Infrastructure for Agentic Commerce</text>
  </g>

</svg>