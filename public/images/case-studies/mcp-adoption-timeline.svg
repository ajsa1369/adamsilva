<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="30%" stop-color="#8b5cf6"/>
      <stop offset="70%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots3" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#334155" opacity="0.5"/>
    </pattern>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pointGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg3)" rx="12"/>
  <rect width="800" height="500" fill="url(#dots3)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">MCP: From Experiment to Industry Standard</text>
  <line x1="240" y1="48" x2="560" y2="48" stroke="#334155" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="68" y="105" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569">100M</text>
  <line x1="75" y1="100" x2="730" y2="100" stroke="#1e293b" stroke-width="0.5"/>
  <text x="68" y="165" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569">75M</text>
  <line x1="75" y1="160" x2="730" y2="160" stroke="#1e293b" stroke-width="0.5"/>
  <text x="68" y="225" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569">50M</text>
  <line x1="75" y1="220" x2="730" y2="220" stroke="#1e293b" stroke-width="0.5"/>
  <text x="68" y="285" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569">25M</text>
  <line x1="75" y1="280" x2="730" y2="280" stroke="#1e293b" stroke-width="0.5"/>
  <text x="68" y="345" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569">0</text>
  <line x1="75" y1="340" x2="730" y2="340" stroke="#334155" stroke-width="1"/>
  <text x="40" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569" transform="rotate(-90,40,220)">NPM Downloads</text>

  <!-- Area fill under curve -->
  <path d="M120,335 C200,332 280,320 350,290 C400,270 440,230 500,180 C560,130 620,115 700,107 L700,340 L120,340 Z" fill="url(#areaGrad)"/>

  <!-- Growth curve -->
  <path d="M120,335 C200,332 280,320 350,290 C400,270 440,230 500,180 C560,130 620,115 700,107" fill="none" stroke="url(#curveGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow3)"/>

  <!-- Timeline axis -->
  <line x1="75" y1="355" x2="730" y2="355" stroke="#334155" stroke-width="1"/>

  <!-- Milestone 1: Nov 2024 -->
  <line x1="120" y1="340" x2="120" y2="355" stroke="#475569" stroke-width="1"/>
  <text x="120" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Nov 2024</text>
  <circle cx="120" cy="335" r="6" fill="#3b82f6" filter="url(#pointGlow)"/>
  <circle cx="120" cy="335" r="3" fill="#fff"/>
  <!-- Card -->
  <rect x="80" y="380" width="140" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="150" y="398" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">Anthropic launches MCP</text>
  <text x="150" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">~100K initial downloads</text>
  <text x="150" y="426" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#475569">Open protocol specification</text>

  <!-- Milestone 2: Apr 2025 -->
  <line x1="350" y1="290" x2="350" y2="355" stroke="#475569" stroke-width="1"/>
  <text x="350" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Apr 2025</text>
  <circle cx="350" cy="290" r="6" fill="#8b5cf6" filter="url(#pointGlow)"/>
  <circle cx="350" cy="290" r="3" fill="#fff"/>
  <!-- Card -->
  <rect x="270" y="380" width="155" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="347" y="398" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b5cf6">8M+ server downloads</text>
  <text x="347" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">OpenAI adopts MCP</text>
  <text x="347" y="426" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#475569">Ecosystem momentum builds</text>

  <!-- Milestone 3: Jul 2025 -->
  <line x1="500" y1="180" x2="500" y2="355" stroke="#475569" stroke-width="1"/>
  <text x="500" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Jul 2025</text>
  <circle cx="500" cy="180" r="6" fill="#ec4899" filter="url(#pointGlow)"/>
  <circle cx="500" cy="180" r="3" fill="#fff"/>
  <!-- Card -->
  <rect x="440" y="380" width="155" height="50" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1"/>
  <text x="517" y="398" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ec4899">Multi-platform adoption</text>
  <text x="517" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">ChatGPT, Cursor, Gemini</text>
  <text x="517" y="426" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#475569">De facto agent standard</text>

  <!-- Milestone 4: Dec 2025 -->
  <line x1="700" y1="107" x2="700" y2="355" stroke="#475569" stroke-width="1"/>
  <text x="700" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Dec 2025</text>
  <circle cx="700" cy="107" r="7" fill="#f59e0b" filter="url(#pointGlow)"/>
  <circle cx="700" cy="107" r="3.5" fill="#fff"/>
  <!-- Card -->
  <rect x="610" y="380" width="155" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="687" y="398" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f59e0b">Linux Foundation AAIF</text>
  <text x="687" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">97M+ total downloads</text>
  <text x="687" y="426" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#475569">Industry standard status</text>

  <!-- Growth badge -->
  <rect x="600" y="62" width="130" height="30" rx="15" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
  <text x="665" y="82" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f59e0b">970x growth</text>

  <!-- Footer -->
  <text x="400" y="460" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569">Model Context Protocol (MCP) adoption trajectory, Nov 2024 - Dec 2025</text>
  <text x="400" y="478" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Adam Silva Consulting</text>
</svg>